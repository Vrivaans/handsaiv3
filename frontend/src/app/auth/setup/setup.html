<div class="setup-container">
    <div class="setup-card" *ngIf="!rawToken">
        <div class="header">
            <img src="assets/icon.png" alt="HandsAI" class="logo" *ngIf="false"> <!-- Placeholder if needed -->
            <h2>Welcome to HandsAI</h2>
            <p>Secure your instance by creating an admin account.</p>
        </div>

        <div class="error-box" *ngIf="error">
            {{ error }}
        </div>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" [(ngModel)]="username" name="username" placeholder="admin" required>
            </div>

            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="Min 8 characters" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn-primary" [disabled]="loading">
                {{ loading ? 'Configuring...' : 'Complete Setup' }}
            </button>
        </form>
    </div>

    <div class="token-card" *ngIf="rawToken">
        <div class="header success">
            <h2>Setup Complete! 🎉</h2>
            <p>Your admin account has been created successfully.</p>
        </div>

        <div class="warning-box">
            <strong>⚠️ Warning:</strong> {{ warning }}
        </div>

        <div class="token-display">
            <label>Your Personal Access Token (PAT)</label>
            <div class="token-input-group">
                <input type="text" readonly [value]="rawToken">
                <button type="button" class="btn-copy" (click)="copyToken()">
                    {{ copied ? 'Copied!' : 'Copy' }}
                </button>
            </div>
            <small>Provide this token via the <code>X-HandsAI-Token</code> header in your MCP client
                configuration.</small>
        </div>

        <button type="button" class="btn-primary mt-4" (click)="finishSetup()">
            Go to Dashboard
        </button>
    </div>
</div>
